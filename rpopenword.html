<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reinos de Vhalor — Action RPG</title>
  <style>
    :root {
      --bg: #070b16;
      --panel: rgba(15, 20, 38, 0.78);
      --border: rgba(139, 167, 255, 0.28);
      --text: #e9eeff;
      --muted: #b6c0e8;
      --acc: #7bdff6;
      --ok: #7cffb2;
      --warn: #ffd166;
      --bad: #ff7a90;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, Roboto, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 20% -10%, #1e2c67 0%, transparent 60%),
        radial-gradient(900px 500px at 110% 20%, #213560 0%, transparent 60%),
        linear-gradient(180deg, #080d1c 0%, #060912 100%);
      overflow: hidden;
    }

    #layout {
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(540px, 1fr) 360px;
      gap: 14px;
      padding: 14px;
    }

    #gameFrame {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #0c1328;
      box-shadow: 0 20px 48px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.04);
    }

    canvas { width: 100%; height: 100%; display: block; }

    #hud {
      display: grid;
      gap: 10px;
      align-content: start;
      overflow: auto;
      padding-right: 4px;
    }

    .card {
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #9fb1ff;
      font-weight: 700;
    }

    .muted { color: var(--muted); font-size: 12px; line-height: 1.4; }

    .bar {
      height: 10px; border-radius: 999px; overflow: hidden;
      background: rgba(3, 6, 12, .8);
      border: 1px solid rgba(124, 156, 255, .22);
      margin: 5px 0 8px;
    }

    .fill { height: 100%; transition: width .15s linear; }
    .hp { background: linear-gradient(90deg, #9e1c36, #ff5f83); }
    .mana { background: linear-gradient(90deg, #2156d8, #7bdff6); }
    .sta { background: linear-gradient(90deg, #2d6a2f, #7cffb2); }

    #skills li, #quests li { margin-bottom: 5px; font-size: 12px; color: var(--muted); }
    ul { margin: 0; padding-left: 18px; }

    #log {
      height: 180px;
      overflow-y: auto;
      background: rgba(8, 12, 25, .8);
      border: 1px solid rgba(120,145,255,.2);
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      line-height: 1.35;
    }

    .entry { margin-bottom: 4px; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }

    #overlayTips {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 2;
      font-size: 12px;
      color: #d5ddff;
      background: rgba(6,10,20,.45);
      border: 1px solid rgba(133,155,255,.22);
      border-radius: 8px;
      padding: 7px 9px;
      backdrop-filter: blur(6px);
    }

    .kbd {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 6px;
      border: 1px solid rgba(170,190,255,.42);
      background: rgba(33,49,98,.7);
      color: #fff;
      font-size: 11px;
      margin: 0 2px;
    }
  </style>
</head>
<body>
<div id="layout">
  <div id="gameFrame">
    <canvas id="game"></canvas>
    <div id="overlayTips">Mover <span class="kbd">WASD</span> / <span class="kbd">↑↓←→</span> · Skill <span class="kbd">1-5</span> · Interagir <span class="kbd">E</span></div>
  </div>

  <aside id="hud">
    <section class="card">
      <h3 class="title">Herói</h3>
      <div id="heroMeta" class="muted"></div>
      <div class="muted">HP <span id="hpTxt"></span></div>
      <div class="bar"><div id="hp" class="fill hp"></div></div>
      <div class="muted">Mana <span id="manaTxt"></span></div>
      <div class="bar"><div id="mana" class="fill mana"></div></div>
      <div class="muted">Vigor <span id="staTxt"></span></div>
      <div class="bar"><div id="sta" class="fill sta"></div></div>
    </section>

    <section class="card">
      <h3 class="title">Mundo</h3>
      <div id="worldTxt" class="muted"></div>
      <ul id="quests"></ul>
    </section>

    <section class="card">
      <h3 class="title">Combate Tático</h3>
      <ul id="skills"></ul>
    </section>

    <section class="card">
      <h3 class="title">Narrativa dinâmica</h3>
      <div id="narrative" class="muted"></div>
    </section>

    <section class="card">
      <h3 class="title">Log</h3>
      <div id="log"></div>
    </section>
  </aside>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const ui = {
    heroMeta: document.getElementById('heroMeta'), hpTxt: document.getElementById('hpTxt'), manaTxt: document.getElementById('manaTxt'), staTxt: document.getElementById('staTxt'),
    hp: document.getElementById('hp'), mana: document.getElementById('mana'), sta: document.getElementById('sta'),
    worldTxt: document.getElementById('worldTxt'), quests: document.getElementById('quests'), skills: document.getElementById('skills'),
    narrative: document.getElementById('narrative'), log: document.getElementById('log')
  };

  const worldSize = 96;
  const tile = 42;
  const map = [];
  const enemies = [];
  const particles = [];

  const terrain = {
    sea: { n: 'Mar', walk: false, c: '#22457b', danger: 0 },
    sand: { n: 'Costa', walk: true, c: '#85714a', danger: 1 },
    grass: { n: 'Campina', walk: true, c: '#245537', danger: 1 },
    forest: { n: 'Floresta', walk: true, c: '#1d3a25', danger: 2 },
    mountain: { n: 'Montanhas', walk: true, c: '#43495c', danger: 3 },
    swamp: { n: 'Pântano', walk: true, c: '#32452b', danger: 3 },
    ruin: { n: 'Ruínas', walk: true, c: '#4b3f5b', danger: 4 },
    city: { n: 'Cidade', walk: true, c: '#5062a8', danger: 0 }
  };

  const state = {
    day: 1, hour: 9, weather: 'Brisa clara', turn: 0, selectedSkill: null, running: true,
    narrative: 'Você é um exilado em Vhalor. Cada escolha muda o continente.',
    quests: [
      { id: 'intro', done: false, text: 'Procure o Arquivista em Lumis.' },
      { id: 'hunt', done: false, progress: 0, target: 12, text: 'Derrote 12 ameaças nas estradas (0/12).' },
      { id: 'relic', done: false, progress: 0, target: 5, text: 'Recupere 5 relíquias antigas (0/5).' }
    ]
  };

  const hero = {
    x: 12, y: 12,
    level: 1, xp: 0, xpNext: 60,
    hp: 140, maxHp: 140,
    mana: 70, maxMana: 70,
    sta: 90, maxSta: 90,
    atk: 15, armor: 5,
    gold: 40, fame: 0, karma: 0,
    inv: { potion: 2, relic: 0 },
    cd: { dash: 0, cleave: 0, bolt: 0, heal: 0, blink: 0 }
  };

  const keys = new Set();

  function resize() {
    const frame = document.getElementById('gameFrame');
    canvas.width = frame.clientWidth;
    canvas.height = frame.clientHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function log(msg, cls = '') {
    const d = document.createElement('div');
    d.className = `entry ${cls}`;
    d.textContent = `[D${state.day} ${String(state.hour).padStart(2, '0')}:00] ${msg}`;
    ui.log.prepend(d);
  }

  function seeded(x, y) {
    const s = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
    return s - Math.floor(s);
  }

  function genMap() {
    for (let y = 0; y < worldSize; y++) {
      map[y] = [];
      for (let x = 0; x < worldSize; x++) {
        const n = (seeded(x * 0.13, y * 0.13) + seeded(x * 0.06, y * 0.06)) * 0.5;
        let type = 'grass';
        if (n < 0.2) type = 'sea';
        else if (n < 0.28) type = 'sand';
        else if (n < 0.46) type = 'grass';
        else if (n < 0.62) type = 'forest';
        else if (n < 0.75) type = 'swamp';
        else if (n < 0.89) type = 'mountain';
        else type = 'ruin';
        map[y][x] = { type, visited: false };
      }
    }

    const cities = [
      { x: 12, y: 12, name: 'Lumis' },
      { x: 56, y: 30, name: 'Khardun' },
      { x: 34, y: 70, name: 'Velha Costa' }
    ];

    cities.forEach(c => {
      map[c.y][c.x] = { type: 'city', city: c.name, visited: false };
    });

    for (let i = 0; i < 90; i++) spawnEnemy();
  }

  function randomWalkablePos() {
    let x, y;
    do {
      x = Math.floor(Math.random() * worldSize);
      y = Math.floor(Math.random() * worldSize);
    } while (!terrain[map[y][x].type].walk || (x === hero.x && y === hero.y));
    return { x, y };
  }

  function spawnEnemy() {
    const p = randomWalkablePos();
    const danger = terrain[map[p.y][p.x].type].danger;
    const arche = [
      { n: 'Predador', c: '#ff7a90', hp: 42, atk: 11 },
      { n: 'Mercenário', c: '#f3b66f', hp: 52, atk: 10 },
      { n: 'Ocultista', c: '#98a9ff', hp: 36, atk: 13 },
      { n: 'Abominação', c: '#8effb3', hp: 56, atk: 9 }
    ][Math.floor(Math.random() * 4)];

    const level = Math.max(1, danger + Math.floor(Math.random() * 3));
    enemies.push({
      ...p,
      name: arche.n,
      color: arche.c,
      level,
      hp: arche.hp + level * 8,
      maxHp: arche.hp + level * 8,
      atk: arche.atk + level * 2,
      aggro: 6 + danger
    });
  }

  function tAt(x, y) {
    if (x < 0 || y < 0 || x >= worldSize || y >= worldSize) return null;
    return map[y][x];
  }

  function enemyAt(x, y) {
    return enemies.find(e => e.x === x && e.y === y);
  }

  function hitEnemy(enemy, dmg, fx = '#fff') {
    enemy.hp -= dmg;
    burst(enemy.x, enemy.y, fx, 8);
    if (enemy.hp <= 0) {
      hero.xp += 16 + enemy.level * 7;
      hero.gold += 9 + enemy.level * 4;
      if (Math.random() < 0.2 && tAt(enemy.x, enemy.y).type === 'ruin') hero.inv.relic += 1;
      enemies.splice(enemies.indexOf(enemy), 1);
      spawnEnemy();
      trackQuestKill();
      levelUp();
      log(`${enemy.name} foi derrotado.`, 'ok');
    }
  }

  function levelUp() {
    while (hero.xp >= hero.xpNext) {
      hero.xp -= hero.xpNext;
      hero.level++;
      hero.xpNext = Math.floor(hero.xpNext * 1.42);
      hero.maxHp += 20; hero.maxMana += 10; hero.maxSta += 8;
      hero.hp = hero.maxHp; hero.mana = hero.maxMana; hero.sta = hero.maxSta;
      hero.atk += 3; hero.armor += 1; hero.fame += 2;
      log(`Nível ${hero.level}! Você sente o poder fluir.`, 'ok');
    }
  }

  function trackQuestKill() {
    const q = state.quests.find(q => q.id === 'hunt');
    if (!q || q.done) return;
    q.progress++;
    q.text = `Derrote 12 ameaças nas estradas (${q.progress}/12).`;
    if (q.progress >= q.target) {
      q.done = true;
      hero.gold += 180;
      hero.karma += 1;
      log('Contrato de caça concluído! +180 ouro.', 'ok');
    }
  }

  function trackQuestRelic() {
    const q = state.quests.find(q => q.id === 'relic');
    if (!q || q.done) return;
    q.progress = hero.inv.relic;
    q.text = `Recupere 5 relíquias antigas (${q.progress}/5).`;
    if (q.progress >= q.target) {
      q.done = true;
      hero.gold += 240;
      hero.fame += 4;
      log('Coleção ancestral completa! +240 ouro.', 'ok');
    }
  }

  function spendTurn() {
    state.turn++;
    if (state.turn % 2 === 0) {
      state.hour++;
      if (state.hour >= 24) { state.hour = 0; state.day++; }
    }

    if (Math.random() < 0.06) {
      state.weather = ['Brisa clara', 'Névoa densa', 'Chuva fina', 'Tempestade arcana'][Math.floor(Math.random() * 4)];
      log(`O clima mudou: ${state.weather}.`, 'warn');
    }

    hero.mana = Math.min(hero.maxMana, hero.mana + 2);
    hero.sta = Math.min(hero.maxSta, hero.sta + 3);

    Object.keys(hero.cd).forEach(k => { if (hero.cd[k] > 0) hero.cd[k]--; });
    enemyTurn();
  }

  function useSkill(name, dx, dy) {
    if (name === 'dash') {
      if (hero.cd.dash || hero.sta < 14) return false;
      const tx = hero.x + dx * 2, ty = hero.y + dy * 2;
      const t = tAt(tx, ty);
      if (!t || !terrain[t.type].walk || enemyAt(tx, ty)) return false;
      hero.x = tx; hero.y = ty; hero.sta -= 14; hero.cd.dash = 3;
      burst(hero.x, hero.y, '#7bdff6', 14);
      log('Investida Fantasma executada.', 'ok');
      return true;
    }

    if (name === 'cleave') {
      if (hero.cd.cleave || hero.sta < 20) return false;
      const near = enemies.filter(e => Math.abs(e.x - hero.x) + Math.abs(e.y - hero.y) === 1);
      if (!near.length) return false;
      near.forEach(e => hitEnemy(e, hero.atk + 12, '#ffd166'));
      hero.sta -= 20; hero.cd.cleave = 4;
      log(`Corte Circular acertou ${near.length} alvo(s).`, 'ok');
      return true;
    }

    if (name === 'bolt') {
      if (hero.cd.bolt || hero.mana < 18) return false;
      let tx = hero.x + dx, ty = hero.y + dy;
      for (let i = 0; i < 5; i++) {
        const e = enemyAt(tx, ty);
        if (e) {
          hitEnemy(e, hero.atk + 18, '#98a9ff');
          hero.mana -= 18; hero.cd.bolt = 2;
          log('Raio Etéreo acertou em cheio.', 'ok');
          return true;
        }
        const tt = tAt(tx, ty);
        if (!tt || !terrain[tt.type].walk) break;
        tx += dx; ty += dy;
      }
      return false;
    }

    if (name === 'heal') {
      if (hero.cd.heal || hero.mana < 24) return false;
      const val = 28 + hero.level * 4;
      hero.hp = Math.min(hero.maxHp, hero.hp + val);
      hero.mana -= 24; hero.cd.heal = 5;
      burst(hero.x, hero.y, '#7cffb2', 16);
      log(`Renovação Vital curou ${val} HP.`, 'ok');
      return true;
    }

    if (name === 'blink') {
      if (hero.cd.blink || hero.sta < 18) return false;
      let tx = hero.x + dx * 4, ty = hero.y + dy * 4;
      while ((tx !== hero.x || ty !== hero.y) && (!tAt(tx, ty) || !terrain[tAt(tx, ty).type].walk || enemyAt(tx, ty))) {
        tx -= dx; ty -= dy;
      }
      if (tx === hero.x && ty === hero.y) return false;
      hero.x = tx; hero.y = ty; hero.sta -= 18; hero.cd.blink = 4;
      burst(hero.x, hero.y, '#ffffff', 18);
      log('Passo Astral usado para reposicionamento.', 'ok');
      return true;
    }

    return false;
  }

  function move(dx, dy) {
    if (!state.running) return;

    const skill = state.selectedSkill;
    if (skill) {
      state.selectedSkill = null;
      if (useSkill(skill, dx, dy)) {
        spendTurn();
        return;
      }
    }

    const nx = hero.x + dx, ny = hero.y + dy;
    const t = tAt(nx, ny);
    if (!t || !terrain[t.type].walk) {
      log('Caminho bloqueado.', 'warn');
      return;
    }

    const foe = enemyAt(nx, ny);
    if (foe) {
      const dmg = hero.atk + Math.floor(Math.random() * 8);
      hitEnemy(foe, dmg, '#ff7a90');
      log(`Você causou ${dmg} em ${foe.name}.`);
      spendTurn();
      return;
    }

    hero.x = nx; hero.y = ny;
    map[hero.y][hero.x].visited = true;
    spendTurn();
  }

  function interact() {
    const t = tAt(hero.x, hero.y);
    if (!t) return;

    if (t.type === 'city') {
      const intro = state.quests.find(q => q.id === 'intro');
      if (!intro.done) {
        intro.done = true;
        hero.gold += 100;
        hero.fame += 2;
        state.narrative = 'Arquivista: "As ruínas guardam as Chaves da Aurora. Traga 5 relíquias."';
        log('Prólogo concluído! +100 ouro.', 'ok');
      } else if (hero.gold >= 30) {
        hero.gold -= 30;
        hero.hp = hero.maxHp; hero.mana = hero.maxMana; hero.sta = hero.maxSta;
        state.narrative = 'Você descansou em uma estalagem iluminada por runas antigas.';
        log('Recuperação completa na cidade.', 'ok');
      } else {
        state.narrative = 'Estalajadeiro: "Sem ouro, sem cama."';
        log('Você não tem ouro para descansar.', 'warn');
      }
      return;
    }

    if (t.type === 'ruin') {
      if (Math.random() < 0.5) {
        hero.inv.relic++;
        trackQuestRelic();
        log('Relíquia encontrada entre escombros.', 'ok');
      } else {
        log('Nenhum item útil nas ruínas.', 'warn');
      }
      state.narrative = 'Sussurros de eras perdidas ecoam no ar.';
      return;
    }

    state.narrative = 'Não há nada relevante para interagir aqui.';
  }

  function enemyTurn() {
    for (const e of enemies) {
      const dx = hero.x - e.x;
      const dy = hero.y - e.y;
      const dist = Math.abs(dx) + Math.abs(dy);

      if (dist === 1) {
        const dmg = Math.max(1, e.atk - hero.armor + Math.floor(Math.random() * 4));
        hero.hp -= dmg;
        burst(hero.x, hero.y, '#ff5f83', 10);
        log(`${e.name} atingiu você por ${dmg}.`, 'bad');
        if (hero.hp <= 0) {
          hero.hp = 0;
          state.running = false;
          state.narrative = 'Você caiu em batalha. Recarregue para tentar novamente.';
          log('Fim de jogo.', 'bad');
          break;
        }
      } else if (dist <= e.aggro) {
        const mx = Math.abs(dx) > Math.abs(dy) ? Math.sign(dx) : 0;
        const my = mx === 0 ? Math.sign(dy) : 0;
        const nx = e.x + mx, ny = e.y + my;
        const tt = tAt(nx, ny);
        if (tt && terrain[tt.type].walk && !enemyAt(nx, ny) && !(nx === hero.x && ny === hero.y)) {
          e.x = nx; e.y = ny;
        }
      }
    }
  }

  function burst(x, y, color, amount) {
    for (let i = 0; i < amount; i++) {
      particles.push({
        x: x * tile + tile * 0.5,
        y: y * tile + tile * 0.5,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        life: 24 + Math.random() * 12,
        color
      });
    }
  }

  function drawMap(camX, camY, viewW, viewH) {
    for (let y = 0; y < viewH; y++) {
      for (let x = 0; x < viewW; x++) {
        const wx = camX + x;
        const wy = camY + y;
        const t = tAt(wx, wy);

        const px = x * tile;
        const py = y * tile;

        if (!t) {
          ctx.fillStyle = '#02040a';
          ctx.fillRect(px, py, tile + 1, tile + 1);
          continue;
        }

        ctx.fillStyle = terrain[t.type].c;
        ctx.fillRect(px, py, tile + 1, tile + 1);

        const grain = (seeded(wx * 1.91, wy * 1.91) * 26) | 0;
        ctx.fillStyle = `rgba(255,255,255,${0.02 + grain / 2000})`;
        ctx.fillRect(px + 2, py + 2, tile - 4, tile - 4);

        if (t.type === 'forest') {
          ctx.fillStyle = 'rgba(120,220,160,.18)';
          ctx.beginPath(); ctx.arc(px + tile * .5, py + tile * .5, 7, 0, Math.PI * 2); ctx.fill();
        }
        if (t.type === 'ruin') {
          ctx.fillStyle = 'rgba(240,220,255,.25)';
          ctx.fillRect(px + 13, py + 11, 16, 16);
        }
        if (t.type === 'city') {
          ctx.fillStyle = 'rgba(255,245,175,.45)';
          ctx.fillRect(px + 12, py + 12, 18, 18);
        }
      }
    }
  }

  function drawHero(px, py) {
    ctx.save();
    ctx.translate(px + tile / 2, py + tile / 2);
    ctx.fillStyle = '#c4d5ff';
    ctx.beginPath(); ctx.arc(0, -6, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2f4ea4';
    ctx.beginPath(); ctx.moveTo(-11, 14); ctx.lineTo(0, -3); ctx.lineTo(11, 14); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(123,223,246,.8)';
    ctx.beginPath(); ctx.arc(0, 3, 4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawEnemies(camX, camY, viewW, viewH) {
    for (const e of enemies) {
      if (e.x < camX || e.y < camY || e.x >= camX + viewW || e.y >= camY + viewH) continue;
      const px = (e.x - camX) * tile;
      const py = (e.y - camY) * tile;
      ctx.fillStyle = e.color;
      ctx.beginPath(); ctx.arc(px + tile / 2, py + tile / 2, 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,.28)';
      ctx.fillRect(px + 7, py + 3, tile - 14, 4);
      ctx.fillStyle = '#ff8ca2';
      ctx.fillRect(px + 7, py + 3, (tile - 14) * (e.hp / e.maxHp), 4);
    }
  }

  function drawParticles(camX, camY) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= 1;
      p.x += p.vx;
      p.y += p.vy;
      if (p.life <= 0) { particles.splice(i, 1); continue; }

      const sx = p.x - camX * tile;
      const sy = p.y - camY * tile;
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life / 36);
      ctx.fillRect(sx, sy, 3, 3);
      ctx.globalAlpha = 1;
    }
  }

  function drawLighting() {
    const night = (state.hour >= 20 || state.hour <= 5) ? 0.38 : 0;
    if (!night) return;
    ctx.fillStyle = `rgba(4,8,20,${night})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const viewW = Math.ceil(canvas.width / tile);
    const viewH = Math.ceil(canvas.height / tile);
    const camX = Math.max(0, Math.min(worldSize - viewW, hero.x - Math.floor(viewW / 2)));
    const camY = Math.max(0, Math.min(worldSize - viewH, hero.y - Math.floor(viewH / 2)));
    const hx = (hero.x - camX) * tile + tile / 2;
    const hy = (hero.y - camY) * tile + tile / 2;

    const g = ctx.createRadialGradient(hx, hy, 30, hx, hy, 170);
    g.addColorStop(0, 'rgba(255,245,185,.25)');
    g.addColorStop(1, 'rgba(255,245,185,0)');
    ctx.fillStyle = g;
    ctx.fillRect(hx - 170, hy - 170, 340, 340);
  }

  function render() {
    const viewW = Math.ceil(canvas.width / tile);
    const viewH = Math.ceil(canvas.height / tile);
    const camX = Math.max(0, Math.min(worldSize - viewW, hero.x - Math.floor(viewW / 2)));
    const camY = Math.max(0, Math.min(worldSize - viewH, hero.y - Math.floor(viewH / 2)));

    drawMap(camX, camY, viewW, viewH);
    drawEnemies(camX, camY, viewW, viewH);
    drawHero((hero.x - camX) * tile, (hero.y - camY) * tile);
    drawParticles(camX, camY);
    drawLighting();

    requestAnimationFrame(render);
  }

  function updateUI() {
    ui.heroMeta.innerHTML = `Nível ${hero.level} • XP ${hero.xp}/${hero.xpNext}<br>Ataque ${hero.atk} • Armadura ${hero.armor}<br>Ouro ${hero.gold} • Fama ${hero.fame} • Karma ${hero.karma}<br>Relíquias ${hero.inv.relic} • Poções ${hero.inv.potion}`;
    ui.hpTxt.textContent = `${hero.hp}/${hero.maxHp}`;
    ui.manaTxt.textContent = `${hero.mana}/${hero.maxMana}`;
    ui.staTxt.textContent = `${hero.sta}/${hero.maxSta}`;
    ui.hp.style.width = `${(hero.hp / hero.maxHp) * 100}%`;
    ui.mana.style.width = `${(hero.mana / hero.maxMana) * 100}%`;
    ui.sta.style.width = `${(hero.sta / hero.maxSta) * 100}%`;

    const tt = tAt(hero.x, hero.y);
    ui.worldTxt.innerHTML = `Dia ${state.day} · ${String(state.hour).padStart(2, '0')}:00<br>Clima: ${state.weather}<br>Região: ${tt ? terrain[tt.type].n : '—'}<br>Inimigos ativos: ${enemies.length}`;

    ui.quests.innerHTML = state.quests.map(q => `<li>${q.done ? '✅' : '🧭'} ${q.text}</li>`).join('');

    ui.skills.innerHTML = [
      `[1] Investida Fantasma (CD ${hero.cd.dash})`,
      `[2] Corte Circular (CD ${hero.cd.cleave})`,
      `[3] Raio Etéreo (CD ${hero.cd.bolt})`,
      `[4] Renovação Vital (CD ${hero.cd.heal})`,
      `[5] Passo Astral (CD ${hero.cd.blink})`
    ].map(s => `<li>${s}</li>`).join('');

    ui.narrative.textContent = state.narrative;
  }

  function tickUI() { updateUI(); requestAnimationFrame(tickUI); }

  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    keys.add(k);

    if (['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(k)) e.preventDefault();

    if (k === '1') state.selectedSkill = 'dash';
    if (k === '2') state.selectedSkill = 'cleave';
    if (k === '3') state.selectedSkill = 'bolt';
    if (k === '4') {
      if (useSkill('heal', 0, 0)) spendTurn();
    }
    if (k === '5') state.selectedSkill = 'blink';

    if (k === 'e') interact();

    if (k === 'arrowup' || k === 'w') move(0, -1);
    if (k === 'arrowdown' || k === 's') move(0, 1);
    if (k === 'arrowleft' || k === 'a') move(-1, 0);
    if (k === 'arrowright' || k === 'd') move(1, 0);
  });

  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));

  genMap();
  map[hero.y][hero.x].visited = true;
  log('Bem-vindo a Reinos de Vhalor. Explore, lute e crie sua própria lenda.', 'ok');
  render();
  tickUI();
})();
</script>
</body>
</html>
